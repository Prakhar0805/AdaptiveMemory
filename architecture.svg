<svg width="680" height="580" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .node-gray { fill: #f3f4f6; stroke: #d1d5db; }
      .node-teal { fill: #d1fae5; stroke: #6ee7b7; }
      .node-purple { fill: #ede9fe; stroke: #c4b5fd; }
      .node-coral { fill: #fee2e2; stroke: #fca5a5; }
      .node-amber { fill: #fef3c7; stroke: #fcd34d; }
      .node-blue { fill: #dbeafe; stroke: #93c5fd; }
      .title { font-size: 14px; font-weight: 600; fill: #111827; }
      .title-teal { font-size: 14px; font-weight: 600; fill: #065f46; }
      .title-purple { font-size: 14px; font-weight: 600; fill: #4c1d95; }
      .title-coral { font-size: 14px; font-weight: 600; fill: #7f1d1d; }
      .title-amber { font-size: 14px; font-weight: 600; fill: #78350f; }
      .title-blue { font-size: 14px; font-weight: 600; fill: #1e3a5f; }
      .sub { font-size: 12px; fill: #6b7280; }
      .sub-teal { font-size: 12px; fill: #047857; }
      .sub-purple { font-size: 12px; fill: #6d28d9; }
      .sub-coral { font-size: 12px; fill: #991b1b; }
      .sub-amber { font-size: 12px; fill: #92400e; }
      .sub-blue { font-size: 12px; fill: #1d4ed8; }
      .connector { stroke: #9ca3af; stroke-width: 1; fill: none; }

      @media (prefers-color-scheme: dark) {
        .bg { fill: #0d1117; }
        .node-gray { fill: #21262d; stroke: #30363d; }
        .node-teal { fill: #0d2b22; stroke: #1a5c40; }
        .node-purple { fill: #1e1535; stroke: #3d2475; }
        .node-coral { fill: #2d1515; stroke: #7f2020; }
        .node-amber { fill: #2d1f00; stroke: #7a4f00; }
        .node-blue { fill: #0d1e3d; stroke: #1e3a6e; }
        .title { fill: #e6edf3; }
        .title-teal { fill: #4ade80; }
        .title-purple { fill: #c084fc; }
        .title-coral { fill: #f87171; }
        .title-amber { fill: #fbbf24; }
        .title-blue { fill: #60a5fa; }
        .sub { fill: #8b949e; }
        .sub-teal { fill: #34d399; }
        .sub-purple { fill: #a78bfa; }
        .sub-coral { fill: #fca5a5; }
        .sub-amber { fill: #fcd34d; }
        .sub-blue { fill: #93c5fd; }
        .connector { stroke: #30363d; }
      }
    </style>
  </defs>

  <rect width="680" height="580" rx="12" class="bg"/>

  <!-- Query -->
  <rect x="260" y="20" width="160" height="40" rx="8" stroke-width="0.75" class="node-gray"/>
  <text x="340" y="44" text-anchor="middle" class="title">Query</text>

  <!-- Vertical stem -->
  <line x1="340" y1="60" x2="340" y2="90" class="connector" marker-end="url(#arrow)"/>

  <!-- Horizontal bar -->
  <line x1="100" y1="90" x2="340" y2="90" class="connector"/>

  <!-- Working Memory -->
  <line x1="100" y1="90" x2="100" y2="118" class="connector" marker-end="url(#arrow)"/>
  <rect x="40" y="118" width="600" height="48" rx="8" stroke-width="0.75" class="node-teal"/>
  <text x="195" y="138" text-anchor="middle" class="title-teal">Working memory</text>
  <text x="195" y="155" text-anchor="middle" class="sub-teal">Last 10 turns</text>
  <text x="460" y="147" text-anchor="middle" class="sub-teal">Exact, no search · zero latency · fixed-size deque</text>

  <!-- Semantic Memory -->
  <line x1="220" y1="90" x2="220" y2="198" class="connector" marker-end="url(#arrow)"/>
  <rect x="40" y="198" width="600" height="48" rx="8" stroke-width="0.75" class="node-purple"/>
  <text x="195" y="218" text-anchor="middle" class="title-purple">Semantic memory</text>
  <text x="195" y="235" text-anchor="middle" class="sub-purple">Extracted facts via NER + regex</text>
  <text x="460" y="226" text-anchor="middle" class="sub-purple">ChromaDB · BGE embeddings · compressed · durable</text>

  <!-- Episodic Memory -->
  <line x1="340" y1="90" x2="340" y2="278" class="connector" marker-end="url(#arrow)"/>
  <rect x="40" y="278" width="600" height="48" rx="8" stroke-width="0.75" class="node-coral"/>
  <text x="195" y="298" text-anchor="middle" class="title-coral">Episodic memory</text>
  <text x="195" y="315" text-anchor="middle" class="sub-coral">Full messages · importance-weighted</text>
  <text x="460" y="306" text-anchor="middle" class="sub-coral">BGE embeddings · ChromaDB · CrossEncoder rerank</text>

  <!-- Episodic sub-items -->
  <text x="68" y="342" text-anchor="start" class="sub">├── Dual-query retrieval</text>
  <text x="310" y="342" text-anchor="start" class="sub" fill="#9ca3af">(original + first-person supplement)</text>
  <text x="68" y="360" text-anchor="start" class="sub">├── CrossEncoder reranking</text>
  <text x="310" y="360" text-anchor="start" class="sub" fill="#9ca3af">ms-marco-MiniLM-L-6-v2</text>
  <text x="68" y="378" text-anchor="start" class="sub">└── Context window expansion</text>
  <text x="310" y="378" text-anchor="start" class="sub" fill="#9ca3af">±1 neighbor for top-3 results</text>

  <!-- Arrow to date resolution -->
  <line x1="340" y1="388" x2="340" y2="408" class="connector" marker-end="url(#arrow)"/>

  <!-- Date resolution -->
  <rect x="160" y="408" width="360" height="48" rx="8" stroke-width="0.75" class="node-amber"/>
  <text x="340" y="428" text-anchor="middle" class="title-amber">Date resolution pipeline</text>
  <text x="340" y="445" text-anchor="middle" class="sub-amber">Absolute · explicit relative · timestamp anchoring</text>

  <!-- Arrow to prompting -->
  <line x1="340" y1="456" x2="340" y2="476" class="connector" marker-end="url(#arrow)"/>

  <!-- Prompting -->
  <rect x="120" y="476" width="440" height="48" rx="8" stroke-width="0.75" class="node-blue"/>
  <text x="340" y="496" text-anchor="middle" class="title-blue">Question-type aware prompting</text>
  <text x="340" y="513" text-anchor="middle" class="sub-blue">Temporal · factual entity · yes/no · general · qwen2.5:7b</text>

  <!-- Arrow to answer -->
  <line x1="340" y1="524" x2="340" y2="544" class="connector" marker-end="url(#arrow)"/>

  <!-- Answer -->
  <rect x="260" y="544" width="160" height="40" rx="8" stroke-width="0.75" class="node-gray"/>
  <text x="340" y="568" text-anchor="middle" class="title">Answer</text>
</svg>
